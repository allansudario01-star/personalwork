<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Pallet System</title>
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>

<body>
    <div id="offline-banner" class="offline hidden">⚠️ Modo offline</div>

    <header>
        <h1>📦 Pallet System</h1>
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="pallets">PALLETS</button>
            <button class="tab-btn" data-tab="agendamentos">AGENDAMENTOS</button>
        </div>
    </header>

    <main>
        <!-- ABA PALLETS -->
        <section id="pallets-tab" class="tab-content active">
            <div class="filters">
                <select id="position-filter">
                    <option value="">Todas posições</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="G">G</option>
                </select>
                <input type="text" id="search-nf" placeholder="🔍 Buscar NF">
            </div>

            <button id="create-pallet-btn" class="btn-primary">+ NOVO PALLET</button>

            <div id="pallets-list"></div>
        </section>

        <!-- ABA AGENDAMENTOS -->
        <section id="agendamentos-tab" class="tab-content">
            <h2>Agendamentos</h2>
            <button id="create-agendamento-btn" class="btn-primary">+ NOVO AGENDAMENTO</button>

            <form id="agendamento-form" class="hidden">
                <input type="text" id="ag-recebedor" placeholder="Recebedor" required>
                <input type="text" id="ag-hub" placeholder="Hub" required>
                <input type="text" id="ag-estado" placeholder="UF" maxlength="2" required>
                <button type="submit">Salvar</button>
                <button type="button" id="cancel-agendamento">Cancelar</button>
            </form>

            <div id="agendamentos-list"></div>
        </section>
    </main>

    <!-- Modal Criar Pallet -->
    <div id="pallet-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Novo Pallet</h3>
            <form id="pallet-form">
                <input type="text" id="nf" placeholder="Nota Fiscal" required>
                <input type="text" id="recebedor" placeholder="Recebedor" required>
                <input type="text" id="hub" placeholder="Hub" required>
                <input type="text" id="estado" placeholder="UF" maxlength="2" required>
                <input type="text" id="cidade" placeholder="Cidade" required>
                <input type="number" id="maxVolumes" placeholder="Volumes máx" min="1" required>

                <label>Posição:</label>
                <div class="position-grid" id="position-grid"></div>
                <input type="hidden" id="palletPosicao" required>

                <button type="submit">Criar</button>
                <button type="button" id="close-modal">Cancelar</button>
            </form>
        </div>
    </div>

    <!-- Modal Volumes -->
    <div id="volume-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Ajustar Volumes</h3>
            <div id="volume-info"></div>
            <div>
                <button class="btn-volume" data-value="-1">-1</button>
                <button class="btn-volume" data-value="-5">-5</button>
                <button class="btn-volume" data-value="-10">-10</button>
                <input type="number" id="manual-volume" min="0" placeholder="0">
                <button class="btn-volume" data-value="1">+1</button>
                <button class="btn-volume" data-value="5">+5</button>
                <button class="btn-volume" data-value="10">+10</button>
            </div>
            <button id="save-volume">Salvar</button>
            <button id="finalize-pallet">Finalizar Pallet</button>
            <button id="close-volume-modal">Fechar</button>
        </div>
    </div>

    <!-- Seus scripts -->
    <script src="firebase-config.js"></script>
    <script src="palletService.js"></script>
    <script src="agendamentoService.js"></script>
    <script src="app.js"></script>
</body>

</html>
